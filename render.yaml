services:
  # The Node.js Core Backend
  - type: web
    name: saferoute-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: AI_SERVICE_URL
        value: https://saferoute-ai.onrender.com/predict_safety

  # The Python Fast API AI Module
  - type: web
    name: saferoute-ai
    env: python
    buildCommand: "cd ai_service && pip install -r requirements.txt"
    startCommand: "cd ai_service && uvicorn app:app --host 0.0.0.0 --port $PORT"
